version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bi-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_bi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bi-redis
    restart: always
    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    container_name: bi-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data

  mlflow:
    build: ./mlflow
    container_name: bi-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /artifacts
    volumes:
      - mlflow_data:/artifacts

  backend:
    build: ./backend
    container_name: bi-backend
    restart: always
    environment:
      - POSTGRES_SERVER=postgres
      - REDIS_HOST=redis
      - CHROMA_DB_PATH=/workspace/data/chroma
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chromadb

  celery_worker:
    build: ./backend
    container_name: bi-celery-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      - POSTGRES_SERVER=postgres
      - REDIS_HOST=redis
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: bi-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: bi-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: bi-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  chroma_data:
  mlflow_data:
